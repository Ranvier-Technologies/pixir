name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  elixir:
    name: Elixir checks
    # This file is synced verbatim to the public mirror (Ranvier-Technologies/pixir),
    # where Blacksmith is not installed. The condition names ONLY the public repo
    # (the sync verifier rejects private-name mentions): the mirror gets free
    # GitHub-hosted runners, everywhere else (the development repo) keeps
    # Blacksmith. Rename the mirror -> update this.
    runs-on: ${{ github.repository == 'Ranvier-Technologies/pixir' && 'ubuntu-24.04' || 'blacksmith-4vcpu-ubuntu-2404' }}
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set up Erlang/OTP and Elixir
        uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93
        with:
          otp-version: "29"
          elixir-version: "1.20.2"

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run tests with warnings as errors
        env:
          MIX_ENV: test
        run: mix do compile --warnings-as-errors + test --warnings-as-errors

      - name: Build Pixir escript
        run: mix escript.build

      - name: Run Pixir doctor
        run: ./pixir doctor --json

      - name: Run workflow smoke
        run: mix pixir.smoke.workflows --dry-run --json

      - name: Run prompt-cache smoke
        run: mix pixir.smoke.prompt_cache --dry-run --json

      - name: Run WebSocket smoke
        run: mix pixir.smoke.websocket --dry-run --json

      - name: Set up Chrome for Pixir Monitor browser suites
        # ACTION pinned by commit (browser-actions/setup-chrome v2.1.2); the
        # BROWSER deliberately tracks the stable channel — these suites are
        # honesty gates against the browser operators actually run, and a
        # breaking stable release failing CI is signal, not flake. Upgrades
        # every default browser-gated Monitor suite from local-only to
        # CI-mandatory (#401) on the mirror's ubuntu runner and Blacksmith
        # alike; install-dependencies keeps both runner families
        # self-sufficient on Chrome's shared libraries. The opt-in 300s
        # lifecycle suite (PIXIR_MONITOR_LIFECYCLE=1) stays OUT of CI by
        # design; the 25-minute budget covers the default suites only.
        id: setup-chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Set up Node.js for Pixir Monitor browser suites
        # Pinned action (actions/setup-node v7.0.0, lightweight tag = commit).
        # The CDP harnesses gate on the global WebSocket that ships in
        # Node >= 22; the runner image's default node predates it, which left
        # all 13 browser suites skipping even with Chrome installed (measured
        # on run 29539227088: 267 passed, 13 skipped).
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "22"

      - name: Fetch Pixir Monitor dependencies
        working-directory: monitor
        run: mix deps.get

      - name: Check Pixir Monitor formatting
        working-directory: monitor
        run: mix format --check-formatted

      - name: Compile Pixir Monitor with warnings as errors
        working-directory: monitor
        run: mix compile --warnings-as-errors

      - name: Run Pixir Monitor tests with warnings as errors
        working-directory: monitor
        env:
          MIX_ENV: test
          # The browser suites detect this binary first; --no-sandbox is a CI
          # runner necessity (root containers), gated to this env knob so
          # local runs never carry it (adjudicated in the #397 round).
          PIXIR_MONITOR_BROWSER_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          PIXIR_MONITOR_BROWSER_EXTRA_ARGS: "--no-sandbox --disable-dev-shm-usage"
        run: mix do compile --warnings-as-errors + test --warnings-as-errors

      - name: Build Pixir Monitor escript
        working-directory: monitor
        run: mix escript.build

      - name: Self-check built Pixir Monitor escript
        working-directory: monitor
        run: ./pixir-monitor self-check --json

      - name: Exercise Pixir Monitor help
        working-directory: monitor
        run: ./pixir-monitor --help

      - name: Exercise Pixir Monitor dry-run serve
        working-directory: monitor
        run: ./pixir-monitor serve --dry-run --json

      - name: Build docs with warnings as errors
        run: mix docs --warnings-as-errors
